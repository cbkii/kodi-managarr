name: Build and publish Kodi release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release and update
        required: true
        default: main
        type: string
      version:
        description: Exact x.y.z version; blank resumes an untagged manifest version or increments the highest tag
        required: false
        default: ""
        type: string
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options: [stable, prerelease, draft]
      release_notes:
        description: Release highlights; also written to addon.xml news
        required: true
        type: string
      mark_latest:
        description: Mark a stable release as Latest
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: kodi-release-${{ github.repository }}
  cancel-in-progress: false

env:
  EXPECTED_ADDON_ID: context.arr.manager
  GH_TOKEN: ${{ github.token }}
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  release:
    name: Validate, version, package, and release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: kodi-release
    steps:
      - name: Check out release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve version and update add-on metadata
        id: metadata
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          python - <<'PY'
          import os, re, subprocess
          import xml.etree.ElementTree as ET
          from datetime import date
          from pathlib import Path
          from xml.sax.saxutils import escape

          expected = os.environ['EXPECTED_ADDON_ID']
          requested_raw = os.environ.get('REQUESTED_VERSION', '').strip()
          requested = requested_raw[1:] if requested_raw.startswith('v') else requested_raw
          notes = ' '.join(os.environ['RELEASE_NOTES'].split())
          path = Path('addon.xml')
          content = path.read_text(encoding='utf-8')
          root = ET.fromstring(content)
          current = root.attrib.get('version', '')
          pattern = re.compile(r'^[0-9]+\.[0-9]+\.[0-9]+$')
          if root.attrib.get('id') != expected or not pattern.fullmatch(current):
              raise SystemExit('Invalid add-on identity or version')
          tags = []
          existing = set()
          for raw in subprocess.check_output(['git', 'tag', '--list', 'v*'], text=True).splitlines():
              tag = raw.strip(); existing.add(tag)
              candidate = tag[1:] if tag.startswith('v') else tag
              if pattern.fullmatch(candidate):
                  tags.append(tuple(map(int, candidate.split('.'))))
          highest_tag = max(tags, default=(0, 0, 0))
          current_tuple = tuple(map(int, current.split('.')))
          if requested:
              if not pattern.fullmatch(requested):
                  raise SystemExit('Requested version must use x.y.z')
              version_tuple = tuple(map(int, requested.split('.')))
              if version_tuple <= highest_tag:
                  raise SystemExit('Requested version must exceed every existing release tag')
              version = requested
              source = 'workflow input'
          elif current_tuple > highest_tag:
              version = current
              source = 'resume untagged manifest version'
          else:
              base = max(current_tuple, highest_tag)
              version = f'{base[0]}.{base[1]}.{base[2] + 1}'
              source = f'automatic patch increment from {base[0]}.{base[1]}.{base[2]}'
          tag = f'v{version}'
          if tag in existing:
              raise SystemExit(f'Tag {tag} already exists')
          updated, count = re.subn(r'(<addon\b[^>]*\bversion=")[^"]+("[^>]*>)', rf'\g<1>{version}\2', content, count=1)
          if count != 1:
              raise SystemExit('Could not update version')
          news = escape(f'{tag} ({date.today().isoformat()}) - {notes}')
          updated, count = re.subn(
              r'(<news>).*?(</news>)',
              lambda match: f'{match.group(1)}{news}{match.group(2)}',
              updated, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Could not update news')
          path.write_text(updated, encoding='utf-8')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'addon_id={expected}\nversion={version}\ntag={tag}\nversion_source={source}\n')
          PY

      - name: Set up Python 3.8
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.8'
      - name: Install validation tools on Python 3.8
        run: |
          set -euxo pipefail
          python --version
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m pip check
      - name: Validate XML, metadata, images and Python on Python 3.8
        run: python scripts/validate.py
      - name: Run static checks on Python 3.8
        run: python -m ruff check .
      - name: Run unit tests on Python 3.8
        run: python -m unittest discover -s tests -v

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install validation tools on Python 3.12
        run: |
          set -euxo pipefail
          python --version
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m pip check
      - name: Validate XML, metadata, images and Python on Python 3.12
        run: python scripts/validate.py
      - name: Run static checks on Python 3.12
        run: python -m ruff check .
      - name: Run unit tests on Python 3.12
        run: python -m unittest discover -s tests -v
      - name: Build reproducible Kodi package
        id: package
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          export SOURCE_DATE_EPOCH
          python scripts/package.py
          first="$(sha256sum "dist/context.arr.manager-$VERSION.zip" | cut -d' ' -f1)"
          cp "dist/context.arr.manager-$VERSION.zip" "$RUNNER_TEMP/first.zip"
          rm "dist/context.arr.manager-$VERSION.zip"
          python scripts/package.py
          second="$(sha256sum "dist/context.arr.manager-$VERSION.zip" | cut -d' ' -f1)"
          test "$first" = "$second"
          (
            cd dist
            sha256sum "context.arr.manager-$VERSION.zip" > "context.arr.manager-$VERSION.zip.sha256"
            sha256sum --check "context.arr.manager-$VERSION.zip.sha256"
          )
          rm -rf dist/addon-check && mkdir -p dist/addon-check
          python - <<'PY'
          import os, zipfile
          version = os.environ['VERSION']
          with zipfile.ZipFile(f'dist/context.arr.manager-{version}.zip') as archive:
              archive.extractall('dist/addon-check')
              assert archive.testzip() is None
          PY
          echo "asset=dist/context.arr.manager-$VERSION.zip" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/context.arr.manager-$VERSION.zip.sha256" >> "$GITHUB_OUTPUT"
      - name: Run Kodi addon checker
        timeout-minutes: 5
        run: kodi-addon-checker --branch matrix dist/addon-check/context.arr.manager

      - name: Commit authoritative release metadata
        id: commit
        env:
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add addon.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): prepare v$VERSION"
            git push origin "HEAD:$BRANCH"
          fi
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: context.arr.manager-${{ steps.metadata.outputs.version }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 30

      - name: Prepare release notes
        id: notes
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
          TARGET_SHA: ${{ steps.commit.outputs.target_sha }}
          MANUAL_NOTES: ${{ inputs.release_notes }}
          VERSION_SOURCE: ${{ steps.metadata.outputs.version_source }}
          ASSET: ${{ steps.package.outputs.asset }}
        run: |
          set -euo pipefail
          checksum="$(cut -d' ' -f1 "$ASSET.sha256")"
          file="$RUNNER_TEMP/release-notes.md"
          {
            echo '## Release highlights'
            echo
            printf '%s\n' "$MANUAL_NOTES"
            echo
            echo '## Install on Kodi'
            echo
            echo "1. Download \`context.arr.manager-$VERSION.zip\` from **Assets**."
            echo '2. In Kodi, open **Add-ons → Install from zip file**.'
            echo '3. Configure **My add-ons → Context menus → Kodi Managarr**.'
            echo
            echo 'Do not extract the ZIP.'
            echo
            echo '## Build provenance'
            echo
            echo "- Version source: \`$VERSION_SOURCE\`"
            echo "- Commit: \`$TARGET_SHA\`"
            echo "- SHA-256: \`$checksum\`"
          } > "$file"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        id: release
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TARGET_SHA: ${{ steps.commit.outputs.target_sha }}
          ASSET: ${{ steps.package.outputs.asset }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          NOTES_FILE: ${{ steps.notes.outputs.file }}
          CHANNEL: ${{ inputs.channel }}
          MARK_LATEST: ${{ inputs.mark_latest }}
        run: |
          set -euo pipefail
          args=(release create "$TAG" "$ASSET#Kodi-installable add-on" "$CHECKSUM#SHA-256 checksum" --repo "$GITHUB_REPOSITORY" --target "$TARGET_SHA" --title "Managarr v$VERSION" --notes-file "$NOTES_FILE")
          case "$CHANNEL" in
            stable) [[ "$MARK_LATEST" == true ]] && args+=(--latest) || args+=(--latest=false) ;;
            prerelease) args+=(--prerelease --latest=false) ;;
            draft) args+=(--draft --latest=false) ;;
          esac
          gh "${args[@]}"
          url="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Publish workflow summary
        env:
          RELEASE_URL: ${{ steps.release.outputs.url }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION_SOURCE: ${{ steps.metadata.outputs.version_source }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          {
            echo '# Kodi release created'
            echo
            echo "- Release: [$TAG]($RELEASE_URL)"
            echo "- Version source: \`$VERSION_SOURCE\`"
            echo "- Channel: \`$CHANNEL\`"
          } >> "$GITHUB_STEP_SUMMARY"
