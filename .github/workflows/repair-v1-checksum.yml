name: Repair v1.0.0 checksum asset

on:
  push:
    branches: [main]
    paths: [.github/REPAIR_V1_CHECKSUM]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: v1.0.0
      ASSET: context.arr.manager-1.0.0.zip
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - name: Download published Kodi package
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ASSET" \
            --dir dist
      - name: Replace checksum asset with portable checksum
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum "$ASSET" > "$ASSET.sha256"
            sha256sum --check "$ASSET.sha256"
            test "$(awk '{print $2}' "$ASSET.sha256")" = "$ASSET"
          )
          gh release upload "$TAG" "dist/$ASSET.sha256#SHA-256 checksum" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
      - name: Record verified repair
        run: |
          set -euo pipefail
          checksum="$(cat "dist/$ASSET.sha256")"
          printf '%s\n' "$checksum" > .github/REPAIR_V1_CHECKSUM_DONE
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/REPAIR_V1_CHECKSUM_DONE
          git commit -m 'chore: record v1.0.0 checksum repair'
          git push origin HEAD:main
