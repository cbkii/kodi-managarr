name: Apply release-audit runtime patch

on:
  push:
  pull_request:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  apply-audit-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: audit/android-kodi-release-readiness
      - name: Apply staged runtime patch and remove one-time scaffolding
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail
          exec > >(tee "$RUNNER_TEMP/apply-audit.log") 2>&1
          test -d .audit-payload
          : > "$RUNNER_TEMP/audit-runtime.patch"
          for chunk in .audit-payload/runtime-*.b64; do
            base64 --decode "$chunk" >> "$RUNNER_TEMP/audit-runtime.patch"
          done
          includes=(
            --include='resources/lib/arr_manager/entrypoints.py'
            --include='resources/lib/arr_manager/subtitle_service.py'
            --include='resources/lib/arr_manager/interactive_entrypoint.py'
            --include='subtitles.py'
          )
          git apply --check "${includes[@]}" "$RUNNER_TEMP/audit-runtime.patch"
          git apply "${includes[@]}" "$RUNNER_TEMP/audit-runtime.patch"
          rm -rf .audit-payload .github/workflows/apply-audit-runtime.yml
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Complete Android Kodi runtime hardening"
          git push origin HEAD:audit/android-kodi-release-readiness
      - name: Upload apply diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-apply-diagnostics
          path: ${{ runner.temp }}/apply-audit.log
          if-no-files-found: error
          retention-days: 7
      - name: Propagate apply failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
