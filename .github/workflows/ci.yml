name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  apply-final-review-fixes:
    if: github.head_ref == 'audit/android-kodi-release-readiness' || github.ref_name == 'audit/android-kodi-release-readiness'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: audit/android-kodi-release-readiness
      - name: Apply fixes and restore normal CI
        shell: bash
        run: |
          set -euo pipefail
          test -f .review-fixes.patch || exit 0
          python - <<'PY'
          from pathlib import Path

          subtitle = Path("resources/lib/arr_manager/subtitle_service.py")
          source = subtitle.read_text(encoding="utf-8")
          source = source.replace(
              "from .interactive_messages import imessage\nfrom .models import SelectedItem\n",
              "from .interactive_messages import imessage\nfrom .kodi_jsonrpc import KodiJsonRpcError\nfrom .models import SelectedItem\n",
              1,
          )
          source = source.replace(
              '        series_detail = kodi_client.tvshow_details(tvshow_id) if tvshow_id > 0 else {}\n',
              '        series_detail = {}\n'
              '        if tvshow_id > 0:\n'
              '            try:\n'
              '                series_detail = kodi_client.tvshow_details(tvshow_id)\n'
              '            except KodiJsonRpcError:\n'
              '                series_detail = {}\n',
              1,
          )
          subtitle.write_text(source, encoding="utf-8")

          tests = Path("tests/test_release_readiness.py")
          source = tests.read_text(encoding="utf-8")
          source = source.replace(
              "from arr_manager.errors import SafetyError\nfrom arr_manager.kodi_selected import enrich_selected_series_identity\n",
              "from arr_manager.errors import SafetyError\nfrom arr_manager.kodi_jsonrpc import KodiJsonRpcError\nfrom arr_manager.kodi_selected import enrich_selected_series_identity\n",
              1,
          )
          marker = '''        self.assertEqual(selected.series_year, 2020)\n        self.assertEqual((selected.season, selected.episode), (0, 1))\n\n\nclass SubtitleEntrypointTests(unittest.TestCase):\n'''
          replacement = '''        self.assertEqual(selected.series_year, 2020)\n        self.assertEqual((selected.season, selected.episode), (0, 1))\n\n    def test_playing_episode_survives_parent_detail_lookup_failure(self):\n        xbmc_module = types.SimpleNamespace(\n            getInfoLabel=lambda key: {"VideoPlayer.DBTYPE": "episode", "VideoPlayer.DBID": "44"}.get(key, ""),\n            Player=lambda: types.SimpleNamespace(getPlayingFile=lambda: "smb://server/Shows/Episode.mkv"),\n        )\n        kodi = mock.MagicMock()\n        kodi.episode_details.return_value = {\n            "title": "Episode", "season": 1, "episode": 2, "tvshowid": 7,\n            "tvshowtitle": "Show", "uniqueid": {"tvdb": "555"},\n        }\n        kodi.tvshow_details.side_effect = KodiJsonRpcError("temporary failure")\n\n        selected = selected_from_player(mock.MagicMock(), xbmc_module, kodi)\n\n        self.assertEqual(selected.tvshow_title, "Show")\n        self.assertEqual(selected.tvshow_db_id, 7)\n        self.assertEqual(selected.series_unique_ids, {})\n        self.assertEqual(selected.series_year, 0)\n\n\nclass SubtitleEntrypointTests(unittest.TestCase):\n'''
          if marker not in source:
              raise SystemExit("test insertion marker not found")
          source = source.replace(marker, replacement, 1)
          tests.write_text(source, encoding="utf-8")
          PY
          rm -f .review-fixes.patch .github/workflows/apply-final-review-fixes.yml
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Handle transient parent metadata lookup failures"
          git push origin HEAD:audit/android-kodi-release-readiness

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Validate workflows
        run: '"$(go env GOPATH)/bin/actionlint"'

  validate:
    name: Validate (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.12']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install validation tools
        run: |
          set -euxo pipefail
          python --version
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m pip check
      - name: Validate XML, metadata, images and Python
        run: |
          set -o pipefail
          python scripts/validate.py 2>&1 | tee "$RUNNER_TEMP/validation.log"
      - name: Run static checks
        run: python -m ruff check .
      - name: Run unit tests
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/unit-tests.log"
          if ! python -m unittest discover -s tests -v >"$log" 2>&1; then
            echo 'Unit tests failed; showing the final 250 lines:'
            tail -n 250 "$log"
            exit 1
          fi
          tail -n 20 "$log"
      - name: Upload failed validation and unit-test logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failure-logs-${{ matrix.python-version }}
          path: |
            ${{ runner.temp }}/validation.log
            ${{ runner.temp }}/unit-tests.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Validate workflow-selected release version
        run: |
          set -euo pipefail
          cp addon.xml "$RUNNER_TEMP/addon.xml.original"
          trap 'cp "$RUNNER_TEMP/addon.xml.original" addon.xml' EXIT
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("addon.xml")
          content = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(<addon\b[^>]*\bversion=")[^"]+("[^>]*>)',
              r'\g<1>99.99.10\2',
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not update addon.xml version for release regression test")
          path.write_text(updated, encoding="utf-8")
          PY
          python scripts/validate.py
          python -m unittest discover -s tests -p 'test_branding.py' -v
      - name: Build reproducible package
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH=1700000000
          python scripts/package.py
          first="$(sha256sum dist/context.arr.manager-*.zip | cut -d' ' -f1)"
          rm -rf dist
          python scripts/package.py
          second="$(sha256sum dist/context.arr.manager-*.zip | cut -d' ' -f1)"
          test "$first" = "$second"
      - name: Extract package for Kodi validation
        if: matrix.python-version == '3.12'
        run: |
          set -euo pipefail
          python - <<'PY'
          import shutil, zipfile
          from pathlib import Path
          archive = next(Path('dist').glob('context.arr.manager-*.zip'))
          target = Path('dist/addon-check')
          shutil.rmtree(target, ignore_errors=True)
          target.mkdir(parents=True)
          with zipfile.ZipFile(archive) as handle:
              handle.extractall(target)
          PY
      - name: Run Kodi addon checker
        if: matrix.python-version == '3.12'
        timeout-minutes: 5
        run: kodi-addon-checker --branch matrix dist/addon-check/context.arr.manager
      - name: Inspect package
        run: |
          python - <<'PY'
          import stat, zipfile
          from pathlib import Path
          archive_path = next(Path('dist').glob('context.arr.manager-*.zip'))
          required = {
              'context.arr.manager/addon.xml',
              'context.arr.manager/context.py',
              'context.arr.manager/default.py',
              'context.arr.manager/subtitles.py',
              'context.arr.manager/LICENSE.txt',
              'context.arr.manager/resources/settings.xml',
              'context.arr.manager/resources/icon.png',
              'context.arr.manager/resources/fanart.jpg',
          }
          forbidden_parts = {'.git', '.github', '__pycache__', 'tests', 'docs', 'scripts', 'dist'}
          with zipfile.ZipFile(archive_path) as archive:
              names = set(archive.namelist())
              assert required <= names, sorted(required - names)
              assert all(name.startswith('context.arr.manager/') for name in names)
              for info in archive.infolist():
                  assert not (set(Path(info.filename).parts) & forbidden_parts), info.filename
                  mode = (info.external_attr >> 16) & 0o777
                  assert not (mode & stat.S_IXUSR), info.filename
              assert archive.testzip() is None
          print(archive_path)
          PY
      - name: Prepare Android validation bundle
        if: matrix.python-version == '3.12'
        run: |
          set -euo pipefail
          archive="$(find dist -maxdepth 1 -name 'context.arr.manager-*.zip' -print -quit)"
          test -n "$archive"
          name="$(basename "$archive")"
          (
            cd dist
            sha256sum "$name" > "$name.sha256"
            sha256sum --check "$name.sha256"
          )
      - name: Upload Android validation bundle
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: managarr-android-validation
          path: |
            dist/context.arr.manager-*.zip
            dist/context.arr.manager-*.zip.sha256
          if-no-files-found: error
          retention-days: 14
