name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Kodi addon checker
        run: python -m pip install kodi-addon-checker
      - name: Validate XML and Python
        run: python3 scripts/validate.py
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
      - name: Run Kodi addon checker
        run: kodi-addon-checker --branch matrix --allow-folder-id-mismatch .
      - name: Build package
        run: python3 scripts/package.py
      - name: Inspect package
        run: |
          python3 - <<'PY'
          import os
          import stat
          import xml.etree.ElementTree as ET
          import zipfile
          from pathlib import Path

          root = ET.parse('addon.xml').getroot()
          addon_id = root.attrib['id']
          version = root.attrib['version']
          archive_path = Path('dist') / f'{addon_id}-{version}.zip'
          assert archive_path.is_file() and archive_path.stat().st_size > 0
          forbidden_parts = {'.git', '.github', '__pycache__', 'tests', 'docs', 'scripts', 'dist'}
          forbidden_suffixes = {'.pyc', '.pyo'}
          with zipfile.ZipFile(archive_path) as archive:
              names = archive.namelist()
              assert names and all(name.startswith(addon_id + '/') for name in names)
              assert f'{addon_id}/addon.xml' in names
              for info in archive.infolist():
                  rel = info.filename[len(addon_id) + 1:]
                  parts = set(Path(rel).parts)
                  assert not (parts & forbidden_parts), info.filename
                  assert not any(info.filename.endswith(suffix) for suffix in forbidden_suffixes), info.filename
                  mode = (info.external_attr >> 16) & 0o777
                  if mode:
                      assert not (mode & stat.S_IXUSR), f'executable bit set on {info.filename}'
              assert archive.testzip() is None
          print(archive_path)
          PY
