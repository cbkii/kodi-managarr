name: Apply release-audit runtime patch

on:
  push:
    branches:
      - audit/android-kodi-release-readiness
    paths:
      - '.audit-payload/**'
      - '.github/workflows/apply-audit-runtime.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0
      - name: Decode and apply audited runtime patch
        shell: bash
        run: |
          set -euo pipefail
          cat .audit-payload/runtime-*.b64 | tr -d '\n' | base64 --decode > "$RUNNER_TEMP/audit-runtime.patch"
          git apply --check "$RUNNER_TEMP/audit-runtime.patch"
          git apply "$RUNNER_TEMP/audit-runtime.patch"
          rm -rf .audit-payload .github/workflows/apply-audit-runtime.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete Android Kodi runtime hardening"
          git push origin HEAD:audit/android-kodi-release-readiness
