name: Generate and publish Kodi repository

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable release tag to publish; blank selects the latest stable release
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kodi-repository-pages
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.release.draft == false && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      addon_version: ${{ steps.generate.outputs.addon_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      repository_zip: ${{ steps.generate.outputs.repository_zip }}
      repository_url: ${{ steps.generate.outputs.repository_url }}
    steps:
      - name: Check out repository tooling
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Resolve exact stable release
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="$EVENT_TAG"
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            tag="$REQUESTED_TAG"
            if [ -z "$tag" ]; then
              tag="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName')"
            fi
          fi
          test -n "$tag"
          metadata="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName)"
          test "$(jq -r '.isDraft' <<<"$metadata")" = false
          test "$(jq -r '.isPrerelease' <<<"$metadata")" = false
          resolved="$(jq -r '.tagName' <<<"$metadata")"
          echo "release_tag=$resolved" >> "$GITHUB_OUTPUT"

      - name: Download exact published add-on asset
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir release-asset
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'managarr-addon_v*.zip' \
            --dir release-asset
          mapfile -t assets < <(find release-asset -maxdepth 1 -type f -name 'managarr-addon_v*.zip' -print)
          test "${#assets[@]}" -eq 1
          mv "${assets[0]}" release.zip

      - name: Generate and validate repository
        id: generate
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH=1700000000
          repository_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          python scripts/generate_repo.py release.zip --repo-url "$repository_url"
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          import zipfile
          from pathlib import Path

          root = ET.parse('pages_output/addons.xml').getroot()
          versions = {addon.attrib['id']: addon.attrib['version'] for addon in root.findall('addon')}
          version = versions['context.arr.manager']
          repo_version = versions['repository.managarr']
          repository_zip = Path('pages_output/repository.managarr') / f'repository.managarr-{repo_version}.zip'
          addon_zip = Path('pages_output/context.arr.manager') / f'context.arr.manager-{version}.zip'
          for path, root_name in ((repository_zip, 'repository.managarr/'), (addon_zip, 'context.arr.manager/')):
              assert path.is_file() and path.stat().st_size > 0
              with zipfile.ZipFile(path) as archive:
                  assert archive.testzip() is None
                  assert archive.namelist() and all(name.startswith(root_name) for name in archive.namelist())
          output = Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as handle:
              handle.write(f'addon_version={version}\n')
              handle.write(f'repository_zip={repository_zip.name}\n')
              handle.write(f'repository_url=https://{os.environ["GITHUB_REPOSITORY_OWNER"]}.github.io/{os.environ["GITHUB_REPOSITORY"].split("/", 1)[1]}\n')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages_output

      - name: Build summary
        env:
          ADDON_VERSION: ${{ steps.generate.outputs.addon_version }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          REPOSITORY_ZIP: ${{ steps.generate.outputs.repository_zip }}
          REPOSITORY_URL: ${{ steps.generate.outputs.repository_url }}
        run: |
          {
            echo '## Kodi repository build'
            echo "- Stable release: \`$RELEASE_TAG\`"
            echo "- Kodi Managarr: \`$ADDON_VERSION\`"
            echo "- Repository: $REPOSITORY_URL"
            echo "- Install ZIP: $REPOSITORY_URL/repository.managarr/$REPOSITORY_ZIP"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment summary
        env:
          ADDON_VERSION: ${{ needs.build.outputs.addon_version }}
          REPOSITORY_URL: ${{ needs.build.outputs.repository_url }}
          REPOSITORY_ZIP: ${{ needs.build.outputs.repository_zip }}
        run: |
          {
            echo '## Kodi repository published'
            echo "- Kodi Managarr: \`$ADDON_VERSION\`"
            echo "- Repository URL: $REPOSITORY_URL"
            echo "- Install ZIP: $REPOSITORY_URL/repository.managarr/$REPOSITORY_ZIP"
          } >> "$GITHUB_STEP_SUMMARY"
