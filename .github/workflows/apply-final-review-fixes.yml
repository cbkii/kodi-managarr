name: Apply final review fixes

on:
  push:
    branches:
      - audit/android-kodi-release-readiness
    paths:
      - '.review-fixes.patch'
      - '.github/workflows/apply-final-review-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: audit/android-kodi-release-readiness
      - name: Apply review fixes and remove one-time files
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .review-fixes.patch
          git apply .review-fixes.patch
          rm .review-fixes.patch .github/workflows/apply-final-review-fixes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Handle transient parent metadata lookup failures"
          git push origin HEAD:audit/android-kodi-release-readiness
